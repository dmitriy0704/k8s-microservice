apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: order-service-postgres
spec:
  serviceName: order-service-postgres-svc
  replicas: 1
  selector:
    matchLabels:
      app: order-service-postgres
  template:
    metadata:
      labels:
        app: order-service-postgres
    spec:
      containers:
        - name: order-service-postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: mydb
            - name: POSTGRES_USER
              value: myuser
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: orders-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: orders-postgres-storage
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: orders-postgres-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
